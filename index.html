<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>My Task Manager</title>
<link rel="stylesheet" href="./styles/app.css">
</head>
<body>
<header>
    <h1>Coles Task Saver📃</h1>
    <p>Save your tasks for free and quickly with coles task saver🥳 </p>
</header>
<main>
    <section class="card">
        <h2>New Task</h2>
        <form  class="form-group" id="taskForm">
        <div class="form-grid">
            <label>Title <input class="box-size" id="txtTitle" required placeholder="Pay the bills" /></label>
            <label>Description <input class="box-size" id="txtDescription" placeholder="Electricity and water" /></label>
            <label>Color <input class="box-size" id="selColor" type="color" value="#ffcc00" /></label>
            <label>Date <input class="box-size" id="selDate" type="date" /></label>
            <label>Status

            <select id="selStatus">
                <option value="New">New</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
            </select>
            </label>
            <label>Budget <input id="numBudget" type="number" step="0.01" placeholder="100.00" /></label>
        </div>
        <button type="button" id="btnSave">Save Task</button>
        </form>
    </section>
    <section class="card">
        <h2>Task List</h2>
        <div id="list" class="list"></div>
    </section>
</main>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="./scripts/task.js"></script>
    <script src="./scripts/app.js"></script>
</body>
</html>
